      This application uses FREE, open-source geocoding services only:

      ┌─ Photon (https://photon.komoot.io) ──────────────────────────────┐
      │  "Search as you type" address suggestions.                        │

      └───────────────────────────────────────────────────────────────────┘

      ┌─ Nominatim (https://nominatim.openstreetmap.org) ────────────────┐
      │  Reverse geocoding — GPS coordinates → human-readable address.   │
      │  Used when the user clicks "Use My Location". Free & open-source. │
      └───────────────────────────────────────────────────────────────────┘

      ┌─ Browser Geolocation API (navigator.geolocation) ────────────────┐
      │  Reads the device GPS / location service.                         │
      │  The browser automatically asks the user for permission.          │
      │  Works on desktop (IP-based) and mobile (GPS).                    │
      └───────────────────────────────────────────────────────────────────┘
