<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMS – Event Management System</title>
    <meta name="description" content="Real-time event planning and vendor matching platform" />
    <!--
      GOOGLE MAPS PLACES API
      ─────────────────────────────────────────────────────────────────────────
      To enable address autocomplete and auto-populate lat/lng:

      1. Go to https://console.cloud.google.com/apis/library
      2. Enable: "Places API" and "Maps JavaScript API"
      3. Create an API key, restrict it to your domain
      4. Replace YOUR_GOOGLE_MAPS_API_KEY below with your actual key

      Without a key, the app still works — users can type addresses manually
      and set coordinates via the map picker or lat/lng fields.
      ─────────────────────────────────────────────────────────────────────────
    -->
    <script>
      // Replace with your real key. When blank, autocomplete is disabled gracefully.
      window.GOOGLE_MAPS_API_KEY = 'YOUR_GOOGLE_MAPS_API_KEY';
    </script>
    <script>
      // Only load Google Maps if a real key is set
      (function() {
        var key = window.GOOGLE_MAPS_API_KEY;
        if (key && key !== 'YOUR_GOOGLE_MAPS_API_KEY') {
          var s = document.createElement('script');
          s.src = 'https://maps.googleapis.com/maps/api/js?key=' + key + '&libraries=places&loading=async';
          s.async = true; s.defer = true;
          document.head.appendChild(s);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
